<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>คุณเป็นผู้หญิงแบบไหน?</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      background: white;
      padding: 20px;
      margin: auto;
      border-radius: 10px;
    }
    button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>คุณเป็นผู้หญิงแบบไหน?</h1>

  <div id="quiz"></div>

  <button onclick="showResult()">ดูผลลัพธ์</button>

  <h2 id="result"></h2>
</div>

<script>
let score = {
  alpha: 0,
  beta: 0,
  omega: 0,
  sigma: 0
};

const questions = [
  {
    question: "เวลามีปัญหา คุณจะทำยังไง?",
    answers: [
      { text: "จัดการเองทันที", type: "alpha" },
      { text: "ปรึกษาคนอื่น", type: "beta" },
      { text: "ปล่อยไปก่อน", type: "omega" },
      { text: "คิดเงียบๆ คนเดียว", type: "sigma" }
    ]
  },
  {
    question: "สไตล์การใช้ชีวิตของคุณ?",
    answers: [
      { text: "เป็นผู้นำ", type: "alpha" },
      { text: "อยู่กับเพื่อน", type: "beta" },
      { text: "สบายๆ ไม่ซีเรียส", type: "omega" },
      { text: "รักอิสระ ไม่ยึดติด", type: "sigma" }
    ]
  },
  {
    question: "เวลาคุณอยู่ในกลุ่มเพื่อน คุณมักเป็นคนแบบไหน?",
    answers: [
      { text: "คนตัดสินใจ / นำทีม", type: "alpha" },
      { text: "คนคอยซัพพอร์ตเพื่อน", type: "beta" },
      { text: "คนเงียบๆ ฟังมากกว่าพูด", type: "omega" },
      { text: "คนแยกตัว แต่ยังคุมเกมได้", type: "sigma" }
    ]
  },
  {
    question: "คุณรับมือกับความกดดันยังไง?",
    answers: [
      { text: "ลุยตรงๆ ไม่ถอย", type: "alpha" },
      { text: "ขอคำแนะนำจากคนที่ไว้ใจ", type: "beta" },
      { text: "พักก่อน ค่อยคิดทีหลัง", type: "omega" },
      { text: "วิเคราะห์เงียบๆ แล้วหาทางเอง", type: "sigma" }
    ]
  },
  {
    question: "สไตล์ความรักของคุณ?",
    answers: [
      { text: "เป็นผู้นำในความสัมพันธ์", type: "alpha" },
      { text: "ดูแล เอาใจใส่คู่รัก", type: "beta" },
      { text: "ปล่อยสบาย ไม่ยึดติด", type: "omega" },
      { text: "รักอิสระ แต่ลึกซึ้ง", type: "sigma" }
    ]
  },
  {
    question: "คุณมองความสำเร็จว่าอะไรสำคัญที่สุด?",
    answers: [
      { text: "อำนาจ และการควบคุม", type: "alpha" },
      { text: "ความสัมพันธ์ที่ดี", type: "beta" },
      { text: "ความสุขส่วนตัว", type: "omega" },
      { text: "อิสระในการใช้ชีวิต", type: "sigma" }
    ]
  },
  {
    question: "ถ้ามีคนไม่ชอบคุณ คุณจะทำยังไง?",
    answers: [
      { text: "ไม่สน และเดินหน้าต่อ", type: "alpha" },
      { text: "พยายามปรับตัวเข้าหา", type: "beta" },
      { text: "รู้สึกนิดหน่อย แต่ปล่อยผ่าน", type: "omega" },
      { text: "เฉยๆ ไม่แคร์ความคิดเห็นใคร", type: "sigma" }
    ]
  }
];

function loadQuiz() {
  const quizDiv = document.getElementById("quiz");

  questions.forEach((q) => {
    const div = document.createElement("div");
    div.innerHTML = `<h3>${q.question}</h3>`;

    q.answers.forEach(a => {
      const btn = document.createElement("button");
      btn.innerText = a.text;
      btn.onclick = () => {
        score[a.type]++;
        btn.style.background = "lightgreen";
      };
      div.appendChild(btn);
    });

    quizDiv.appendChild(div);
  });
}

function showResult() {
  let max = 0;
  let resultType = "";

  for (let key in score) {
    if (score[key] > max) {
      max = score[key];
      resultType = key;
    }
  }

  document.getElementById("result").innerText =
    "คุณเป็นสาย " + resultType.toUpperCase();
}

loadQuiz();
</script>

</body>
</html>
</html>
